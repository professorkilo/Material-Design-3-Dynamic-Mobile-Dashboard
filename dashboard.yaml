      - type: grid
        cards:
          - type: custom:navbar-card
            mobile:
              show_labels: true
            haptic: true
            desktop:
              show_labels: true
              position: left
              min_width: 768
            routes:
              - url: /mobile-dashboard/overview
                label: Home
                icon: m3o:home
                icon_selected: m3of:home
              - url: /mobile-dashboard/rooms
                label: Rooms
                icon: m3o:chair
                icon_selected: mdi:sofa
              - url: /mobile-dashboard/scenes
                label: Scenes
                icon: m3o:layers
                icon_selected: m3of:layers
              - url: /mobile-dashboard/camera
                label: Camera
                icon: m3o:camera
                icon_selected: m3of:camera
              - icon: mdi:dots-horizontal
                label: More
                tap_action:
                  action: open-popup
                popup:
                  - icon: m3of:tools-wrench
                    url: /config/dashboard
            styles: |
              .navbar-card {
                background: color-mix(in srgb, var(--md-sys-color-on-primary) 50%, transparent);
                backdrop-filter: blur(50px);
                -webkit-backdrop-filter: blur(20px) !important;
                background-blend-mode: overlay;
                border-radius: 20px;
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
                margin-bottom: 15px;
                overflow: hidden;
                animation: slideUp 0.5s ease-out 0.6s both;
              }

              @keyframes slideUp {
                from { 
                  opacity: 1;
                  transform: translateY(4px);
                }
                to { 
                  opacity: 1;
                  transform: translateY(0);
                }
              }

              .button.active {
                background: transparent;
              }

              ha-ripple {
                display: none !important;
              }
