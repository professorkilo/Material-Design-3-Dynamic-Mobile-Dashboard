      - entity_id_humidity: ''
      - entity_id_ac: ''
      - entity_id_ac_main: ''
      - entity_id_lights: ''
      - entity_id_covers: ''
      - entity_id_fans: ''
      - entity_id_doors: ''
      - entity_id_windows: ''
      - entity_id_speakers: ''
      - entity_id_custom_1: ''
      - entity_id_custom_2: ''
      - entity_id_custom_3: ''
      - entity_id_custom_4: ''
