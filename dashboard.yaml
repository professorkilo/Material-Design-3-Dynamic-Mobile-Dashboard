                  .: |
                    ha-tile-icon {
                      --mdc-icon-size: 90px;
                    }
                    ha-card {
                      border: none;
                      margin: -8px 0 0 -28px;
                    }
        - type: custom:mushroom-chips-card
          chips:
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[entity_id_ac_main]]'
                  state_not: unknown
                - condition: state
                  entity: '[[entity_id_ac_main]]'
                  state_not: unavailable
              chip:
                type: template
                entity: '[[entity_id_ac]]'
                tap_action:
                  action: toggle
                icon: |
                  {% if is_state('[[entity_id_ac]]', 'off') %}
                    m3o:heat-pump
                  {% else %}
                    m3of:heat-pump
                  {% endif %}
                uix:
                  style: >
                    @keyframes chip-drop {
                      0% { opacity: 0; transform: translateY(-12px) scale(0.85); }
                      60% { transform: translateY(3px) scale(1.05); }
                      100% { opacity: 1; transform: translateY(0) scale(1); }
                    }

                    @keyframes cool-pulse {
                      0% { transform: scale(1); box-shadow: 0 0 6px rgba(139,189,212,0.55), 0 0 18px rgba(139,189,212,0.45), 0 0 42px rgba(139,189,212,0.32), 0 0 90px rgba(139,189,212,0.22); }
                      50% { transform: scale(1.12); box-shadow: 0 0 14px rgba(139,189,212,1), 0 0 34px rgba(139,189,212,0.85), 0 0 80px rgba(139,189,212,0.55), 0 0 170px rgba(139,189,212,0.35); }
                      100% { transform: scale(1); box-shadow: 0 0 6px rgba(139,189,212,0.55), 0 0 18px rgba(139,189,212,0.45), 0 0 42px rgba(139,189,212,0.32), 0 0 90px rgba(139,189,212,0.22); }
                    }

                    @keyframes heat-pulse {
                      0% { transform: scale(1); box-shadow: 0 0 6px rgba(217,79,70,0.55), 0 0 18px rgba(217,79,70,0.45), 0 0 42px rgba(217,79,70,0.32), 0 0 90px rgba(217,79,70,0.22); }
                      50% { transform: scale(1.12); box-shadow: 0 0 14px rgba(217,79,70,1), 0 0 34px rgba(217,79,70,0.85), 0 0 80px rgba(217,79,70,0.55), 0 0 170px rgba(217,79,70,0.35); }
                      100% { transform: scale(1); box-shadow: 0 0 6px rgba(217,79,70,0.55), 0 0 18px rgba(217,79,70,0.45), 0 0 42px rgba(217,79,70,0.32), 0 0 90px rgba(217,79,70,0.22); }
                    }

                    @keyframes fan-spin {
                      0% { transform: rotate(0deg); box-shadow: 0 0 6px rgba(134,232,204,0.55), 0 0 18px rgba(134,232,204,0.45), 0 0 42px rgba(134,232,204,0.32), 0 0 90px rgba(134,232,204,0.22); }
                      50% { box-shadow: 0 0 14px rgba(134,232,204,1), 0 0 34px rgba(134,232,204,0.85), 0 0 80px rgba(134,232,204,0.55), 0 0 170px rgba(134,232,204,0.35); }
                      100% { transform: rotate(360deg); box-shadow: 0 0 6px rgba(134,232,204,0.55), 0 0 18px rgba(134,232,204,0.45), 0 0 42px rgba(134,232,204,0.32), 0 0 90px rgba(134,232,204,0.22); }
                    }

                    @keyframes dry-fade {
                      0%, 100% { transform: scale(1); box-shadow: 0 0 6px rgba(168,148,74,0.55), 0 0 18px rgba(168,148,74,0.45), 0 0 42px rgba(168,148,74,0.32), 0 0 90px rgba(168,148,74,0.22); }
                      50% { transform: scale(1.12); box-shadow: 0 0 14px rgba(168,148,74,1), 0 0 34px rgba(168,148,74,0.85), 0 0 80px rgba(168,148,74,0.55), 0 0 170px rgba(168,148,74,0.35); }
                    }

                    {% set base = '[[animation_delay]]' | replace('s','') |
                    float %}

                    {% set d = (base + 0.05) | round(2) %}

                    {% set ac_main = states('[[entity_id_ac_main]]') %}

                    {% set ac = states('[[entity_id_ac]]') %}

                    ha-card {
                      --chip-background:
                        {% if ac == 'heat_cool' and ac_main == 'cool' %} #b5e0f7
                        {% elif ac == 'heat_cool' and ac_main == 'heat' %} #fa6f66
                        {% elif ac == 'heat_cool' and ac_main == 'fan_only' %} #c3fae8
                        {% elif ac == 'heat_cool' and ac_main == 'dry' %} #cfba74
                        {% elif ac == 'heat_cool' and ac_main == 'off' %} #FFFFFF
                        {% else %} #353535
                        {% endif %};
                      --color: {% if ac == 'off' %} #dbdbdb {% else %} #353535 {% endif %};
                      height: 35px;
                      width: 35px;
                      border-radius: 22px;
                      {% if ac == 'heat_cool' and ac_main == 'cool' %}
                        animation: chip-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both {{ d }}s, cool-pulse 2s ease-in-out infinite {{ d + 0.4 }}s;
                      {% elif ac == 'heat_cool' and ac_main == 'heat' %}
                        animation: chip-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both {{ d }}s, heat-pulse 1.5s ease-in-out infinite {{ d + 0.4 }}s;
                      {% elif ac == 'heat_cool' and ac_main == 'fan_only' %}
                        animation: chip-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both {{ d }}s, fan-spin 3s linear infinite {{ d + 0.4 }}s;
                      {% elif ac == 'heat_cool' and ac_main == 'dry' %}
                        animation: chip-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both {{ d }}s, dry-fade 2s ease-in-out infinite {{ d + 0.4 }}s;
                      {% else %}
                        animation: chip-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both {{ d }}s;
                      {% endif %}
                    }
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[entity_id_lights]]'
                  state_not: unknown
                - condition: state
                  entity: '[[entity_id_lights]]'
                  state_not: unavailable
              chip:
                type: template
                entity: '[[entity_id_lights]]'
