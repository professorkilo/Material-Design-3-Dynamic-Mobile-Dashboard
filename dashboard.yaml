      soil_moisture_sensor: ''
      soil_temperature_sensor: ''
    card:
      type: custom:vertical-stack-in-card
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mushroom-template-card
              entity: '[[switch_entity]]'
              primary: |
                {{ states('[[flow_sensor]]') | round(1) }} m³/h
              secondary: >
                {% set flow = states('[[flow_sensor]]') | float(0) %} {% if
                is_state('[[switch_entity]]', 'on') %}
                  {% if flow < 0.1 %} Minimal Water Flow
                  {% elif flow < 0.3 %} Low Water Flow
                  {% elif flow < 0.6 %} Moderate Water Flow
                  {% else %} High Water Flow
                  {% endif %}
                {% else %}
                  Water Flow
                {% endif %}
              icon: m3of:sprinkler
              tap_action:
                action: toggle
              color: >
                {% set flow = states('[[flow_sensor]]') | float %} {% if flow <
                0.1 %} #A9A9A9 {% elif flow < 0.3 %} #ffd34f {% elif flow < 0.6
                %} #9fe7e8 {% else %} #36a9e2 {% endif %}
              features_position: bottom
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[timer_entity]]'
                  state: active
              card:
                type: custom:timer-bar-card
                entity: '[[timer_entity]]'
                name: Sprinkler
                invert: true
                bar_direction: ltr
                bar_width: 60%
                mushroom:
                  layout: horizontal
                  color: '#4CBB17'
        - type: custom:config-template-card
          entities:
            - '[[flow_sensor]]'
          variables:
            - states['[[flow_sensor]]'].state
          card:
            type: custom:mini-graph-card
            entities:
              - entity: '[[flow_sensor]]'
                name: Water Flow
                color: |-
                  ${vars[0] < 0.1 ? '#a9a9a9' :
                    (vars[0] < 0.3 ? '#ffd34f' :
                    (vars[0] < 0.6 ? '#9fe7e8' :
                    '#36a9e2'))}
            hours_to_show: 24
            line_width: 3
            font_size: 50
            animate: true
            height: 150
            show:
              name: false
              icon: false
              state: false
              legend: false
              fill: fade
        - type: conditional
          conditions:
            - condition: state
              entity: '[[soil_moisture_sensor]]'
              state_not: unavailable
            - condition: state
              entity: '[[soil_moisture_sensor]]'
              state_not: unknown
          card:
            type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                entity: '[[soil_moisture_sensor]]'
                icon: m3of:water-drop
                primary: >
                  {% set moisture = states('[[soil_moisture_sensor]]') |
                  float(0) %} Moist: {{ moisture | round(1) }} %
                secondary: >
                  {% set moisture = states('[[soil_moisture_sensor]]') |
                  float(0) %} {% if moisture < 15 %} Very Dry {% elif moisture <
                  25 %} Dry {% elif moisture < 45 %} Moist {% else %} Wet {%
                  endif %}
                color: >
                  {% set moisture = states('[[soil_moisture_sensor]]') |
                  float(0) %} {% if moisture < 15 %} #A9A9A9 {% elif moisture <
                  25 %} #ffd34f {% elif moisture < 45 %} #9fe7e8 {% else %}
                  #36a9e2 {% endif %}
                features_position: bottom
                multiline_secondary: true
              - type: custom:mushroom-template-card
                entity: '[[soil_temperature_sensor]]'
                icon: m3of:thermometer
                primary: >
                  {% set temp = states('[[soil_temperature_sensor]]') | float(0)
                  %} Temp: {{ temp | round(1) }} {{
                  state_attr('weather.forecast_home', 'temperature_unit') }}
                secondary: >
                  {% set temp = states('[[soil_temperature_sensor]]') | float(0)
                  %} {% if temp < 16 %} Very Cold {% elif temp < 18 %} Cool {%
                  elif temp < 22 %} Mild {% elif temp < 24 %} Warm {% elif temp
                  < 27 %} Hot {% else %} Very Hot {% endif %}
                color: >
                  {% set temp = states('[[soil_temperature_sensor]]') | float(0)
                  %} {% if temp < 16 %} #CEB2F5 {% elif temp < 18 %} #5EBDEE {%
                  elif temp < 22 %} #9cc8b8 {% elif temp < 24 %} #e7b562 {% elif
                  temp < 27 %} #FF564B {% else %} #99332d {% endif %}
                features_position: bottom
                multiline_secondary: true
        - type: custom:streamline-card
          template: title_card
          variables:
            - title: Irrigation Control
        - type: horizontal-stack
          cards:
            - type: custom:mushroom-template-card
              icon: mdi:timer-outline
              primary: 5 m
              tap_action:
                action: call-service
                service: script.start_sprinkler_timer
                data:
                  zone: '[[zone]]'
                  duration: '00:05:00'
              layout: vertical
            - type: custom:mushroom-template-card
              icon: mdi:timer-outline
              primary: 15 m
              tap_action:
                action: call-service
                service: script.start_sprinkler_timer
                data:
                  zone: '[[zone]]'
                  duration: '00:15:00'
              layout: vertical
            - type: custom:mushroom-template-card
              icon: mdi:timer-outline
              primary: 30 m
              tap_action:
                action: call-service
                service: script.start_sprinkler_timer
                data:
                  zone: '[[zone]]'
                  duration: '00:30:00'
              layout: vertical
            - type: custom:mushroom-template-card
              icon: mdi:timer-outline
              primary: 1 hr
              tap_action:
                action: call-service
                service: script.start_sprinkler_timer
                data:
                  zone: '[[zone]]'
                  duration: '01:00:00'
              layout: vertical
            - type: custom:mushroom-template-card
              icon: mdi:timer-outline
              primary: 2 hr
              tap_action:
                action: call-service
                service: script.start_sprinkler_timer
                data:
                  zone: '[[zone]]'
                  duration: '02:00:00'
              layout: vertical
button_card_templates:
  sensor_battery:
    name: |
      [[[ return entity.attributes.device_name; ]]]
    label: |
      [[[ return entity.state + '%' ]]]
    show_icon: true
    show_label: true
    icon: |
      [[[
        var state = parseFloat(entity.state);
        if (state <= 15) {
          return 'mdi:battery-alert';
        } else if (state <= 25) {
          return 'mdi:battery-20';
        } else if (state <= 35) {
          return 'mdi:battery-30';
        } else if (state <= 45) {
          return 'mdi:battery-40';
        } else if (state <= 55) {
          return 'mdi:battery-50';
        } else if (state <= 65) {
          return 'mdi:battery-60';
        } else if (state <= 75) {
          return 'mdi:battery-70';
        } else if (state <= 85) {
          return 'mdi:battery-80';
        } else if (state <= 95) {
          return 'mdi:battery-90';
        } else if (state <= 100) {
          return 'mdi:battery';
        } else {
          return 'mdi:battery-unknown';
        }
      ]]]
    styles:
      card:
        - padding: 12px 16px 10px 16px
        - height: 140px
        - background: var(--card-background-color)
        - border-radius: 16px
      grid:
        - grid-template-areas: '"i l" "n n" "sub sub" "bar bar"'
        - grid-template-columns: auto 1fr
        - grid-template-rows: auto auto auto 1fr
      label:
        - justify-self: end
        - align-self: start
        - font-size: 23px
        - font-weight: 500
        - padding-right: 4px
        - color: |
            [[[
              var state = parseFloat(entity.state);
              if (state <= 20) return '#F95454';
              if (state <= 40) return '#FF9C73';
              if (state <= 60) return '#FBD288';
              if (state <= 80) return '#78B3CE';
              return '#9EDF9C';
            ]]]
      name:
        - justify-self: start
        - align-self: start
        - font-size: 14px
        - font-weight: 500
        - color: var(--primary-text-color)
        - padding-left: 0px
        - margin-top: 4px
        - white-space: nowrap
        - overflow: hidden
        - text-overflow: ellipsis
      img_cell:
        - justify-self: start
        - align-self: start
        - background: |
            [[[
              var state = parseFloat(entity.state);
              if (state <= 20) return 'rgba(249,84,84,0.18)';
              if (state <= 40) return 'rgba(255,156,115,0.18)';
              if (state <= 60) return 'rgba(251,210,136,0.18)';
              if (state <= 80) return 'rgba(120,179,206,0.18)';
              return 'rgba(158,223,156,0.18)';
            ]]]
        - padding: 10px
        - border-radius: 50%
        - width: 24px
        - height: 24px
        - margin-right: 8px
      icon:
        - width: 24px
        - height: 24px
        - color: |
            [[[
              var state = parseFloat(entity.state);
              if (state <= 20) return '#F95454';
              if (state <= 40) return '#FF9C73';
              if (state <= 60) return '#FBD288';
              if (state <= 80) return '#78B3CE';
              return '#9EDF9C';
            ]]]
      custom_fields:
        sub:
          - justify-self: start
          - font-size: 12px
          - color: var(--secondary-text-color)
          - margin-top: 2px
          - padding-left: 0px
          - align-self: start
        bar:
          - justify-self: start
          - width: 100%
          - margin-top: 8px
          - height: 4px
          - border-radius: 4px
          - background: rgba(128,128,128,0.2)
          - overflow: hidden
    custom_fields:
      sub: |
        [[[
          const battery = entity.attributes.battery_type_and_quantity || '';
          const lastUpdated = entity.last_updated;
          let timeStr = '';
          if (lastUpdated) {
            const diffSeconds = Math.floor((new Date() - new Date(lastUpdated)) / 1000);
            if (diffSeconds < 60) timeStr = `${diffSeconds}s ago`;
            else if (diffSeconds < 3600) timeStr = `${Math.floor(diffSeconds/60)}m ago`;
            else if (diffSeconds < 86400) timeStr = `${Math.floor(diffSeconds/3600)}h ago`;
            else timeStr = `${Math.floor(diffSeconds/86400)}d ago`;
          }
          const parts = [battery, timeStr].filter(Boolean);
          return parts.join(' · ');
        ]]]
      bar: |
        [[[
          var state = parseFloat(entity.state);
          var color;
          if (state <= 20) color = '#F95454';
          else if (state <= 40) color = '#FF9C73';
          else if (state <= 60) color = '#FBD288';
          else if (state <= 80) color = '#78B3CE';
          else color = '#9EDF9C';
          return `<div style="width:100%;height:4px;border-radius:4px;background:rgba(128,128,128,0.2);overflow:hidden;">
            <div style="width:${state}%;height:100%;background:${color};border-radius:4px;"></div>
          </div>`;
        ]]]
views:
  - title: Overview
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: wrap
    type: sections
    max_columns: 4
    path: overview
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:stack-in-card
                mode: vertical
                cards:
                  - type: custom:streamline-card
                    template: date_clock_text_card
                    variables:
                      - title: '{{ now().strftime(''%a %b %-d - %I:%M %p'') }}'
                  - type: custom:mushroom-chips-card
                    chips:
                      - type: conditional
                        conditions:
                          - entity: alarm_control_panel.alarmo
                            state: triggered
                        chip:
                          type: template
                          entity: alarm_control_panel.alarmo
                          content: Triggered
                          tap_action:
                            action: navigate
                            navigation_path: '#alarmo'
                          icon: mdi:bell-ring
                          icon_color: '#d14f3a'
                      - type: conditional
                        conditions:
                          - entity: alarm_control_panel.alarmo
                            state: armed_away
                        chip:
                          type: template
                          entity: alarm_control_panel.alarmo
                          content: Armed
                          tap_action:
                            action: navigate
                            navigation_path: '#alarmo'
                          icon: mdi:shield-lock
                          icon_color: '#69ac5a'
                      - type: conditional
                        conditions:
                          - entity: alarm_control_panel.alarmo
                            state: arming
                        chip:
                          type: template
                          entity: alarm_control_panel.alarmo
                          content: Arming
                          tap_action:
                            action: navigate
                            navigation_path: '#alarmo'
                          icon: mdi:shield
                          icon_color: '#efa340'
                      - type: conditional
                        conditions:
                          - entity: alarm_control_panel.alarmo
                            state: pending
                        chip:
                          type: template
                          entity: alarm_control_panel.alarmo
                          content: Pending
                          tap_action:
                            action: navigate
                            navigation_path: '#alarmo'
                          icon: mdi:shield-outline
                          icon_color: '#efa340'
                      - type: conditional
                        conditions:
                          - entity: alarm_control_panel.alarmo
                            state: disarmed
                        chip:
                          type: template
                          entity: alarm_control_panel.alarmo
                          tap_action:
                            action: navigate
                            navigation_path: '#alarmo'
                          icon: mdi:shield-off
                      - type: conditional
                        conditions:
                          - condition: numeric_state
                            entity: sensor.earthquake
                            above: 0
                        chip:
                          type: template
                          entity: geonet.
                          tap_action:
                            action: navigate
                            navigation_path: '#weather-panel'
                          icon: mdi:earth
                          icon_color: >
                            {% set mag =
                            state_attr('sensor.earthquake',
                            'magnitude') | float(0) %} {% if mag >= 6.0 %}
                            #D32F2F {% elif mag >= 5.0 %} #F4511E {% elif mag >=
                            4.0 %} #FB8C00 {% elif mag >= 3.0 %} #F9A825 {% elif
                            mag >= 2.0 %} #FBC02D {% else %} #388E3C {% endif %}
                      - type: conditional
                        conditions:
                          - condition: numeric_state
                            entity: sensor.volcano_rotorua
                            above: 0
                        chip:
                          type: template
                          entity: sensor.volcano_rotorua
                          tap_action:
                            action: navigate
                            navigation_path: '#weather-panel'
                          icon: >
                            {{ state_attr('sensor.volcano_rotorua', 'icon') or
                            'mdi:image-filter-hdr' }}
                          icon_color: >
                            {% set level = states('sensor.volcano_rotorua') |
                            int %}

                            {% if level == 5 %} red

                            {% elif level == 4 %} deep-orange

                            {% elif level == 3 %} orange

                            {% elif level == 2 %} amber

                            {% elif level == 1 %} yellow

                            {% else %} green

                            {% endif %}
                      - type: conditional
                        conditions:
                          - condition: state
                            entity: sensor.home_metservice_weather_warnings
                            state_not: unknown
                        chip:
                          type: template
                          entity: sensor.home_metservice_weather_warnings
                          tap_action:
                            action: navigate
                            navigation_path: '#weather-panel'
                          icon: mdi:alert
                          icon_color: orange
                      - type: template
                        entity: sensor.active_notification_count
                        icon: mdi:bell
                        tap_action:
                          action: navigate
                          navigation_path: '#notifications'
                        hold_action:
                          action: none
                        uix:
                          style: >
                            ha-card {
                              position: relative;
                              transition: transform 0.3s ease, box-shadow 0.3s ease;
                            }

                            {% set notifications =
                            states('sensor.active_notification_count') | int %}

                            {% if notifications > 0 %}

                            ha-card:after {
                              content: "{{ notifications }}";
                              position: absolute;
                              top: -3px;
                              right: -3px;
                              background-color: color-mix(in srgb, var(--md-sys-color-on-primary) 50%, transparent);
                              color: var(--md-sys-color-primary);
                              border-radius: 50%;
                              width: 16px;
                              height: 16px;
                              font-size: 10px;
                              line-height: 16px;
                              text-align: center;
                              display: inline-block;
                              font-weight: bold;

                            } {% endif %}
                    alignment: end
                    uix:
                      style: |
                        ha-card {
                          position: absolute;
                          top: 20px;
                          right: 5px;
                          animation: fadeInRight 0.5s ease-out;
                        }
                        @keyframes fadeInRight {
                          from {
                            opacity: 1;
                            transform: translateX(8px);
                          }
                          to {
                            opacity: 1;
                            transform: translateX(0);
                          }
                        }
              - type: custom:paper-buttons-row
                styles:
                  justify-content: flex-start
                  flex-wrap: wrap
                  font-size: 0.9em
                  line-height: 1.2em
                  margin: 6px 0 2px 0
                  width: 100%
                buttons:
                  - layout: name|icon
                    entity: weather.home
                    name: >-
                      {% set temp = state_attr('weather.home', 'temperature') %}
                      {% set unit = state_attr('weather.home',
                      'temperature_unit') %} {% set condition =
                      states('weather.forecast_home') | title %} {% if
                      is_state('binary_sensor.outdoor_rain_sensor_water_leak',
                      'on') %}
                        {{ temp }} {{ unit }}, Raining
                      {% else %}
                        {{ temp }} {{ unit }}, {{ condition }}
                      {% endif %}
                    icon: >-
                      {% if
                      is_state('binary_sensor.outdoor_rain_sensor_water_leak',
                      'on') %}
                        mdi:weather-pouring
                      {% else %}
                        {{ states('sensor.weather_condition_icon') }}
                      {% endif %}
                    tap_action:
                      action: navigate
                      navigation_path: '#weather-panel'
                    styles:
