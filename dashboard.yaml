      scene_value: ''
    card:
      type: custom:button-card
      entity_picture: '[[img_path]]'
      show_entity_picture: true
      aspect_ratio: 5/3
      styles:
        card:
          - padding: 0px
          - border-radius: 14px
          - overflow: hidden
        entity_picture:
          - width: 100%
          - height: 100%
          - object-fit: cover
        name:
          - font-size: 14px
          - font-weight: '600'
          - color: white
          - text-shadow: 0 1px 4px rgba(0,0,0,0.8)
          - position: absolute
          - top: 8px
          - left: 8px
          - right: 8px
          - text-align: left
          - letter-spacing: 0.3px
      tap_action:
        action: call-service
        service: input_text.set_value
        service_data:
          entity_id: input_text.dynamic_scene_selected
          value: '[[scene_value]]'
      show_name: true
      name: >-
        [[[ return '[[scene_value]]'.split('_').map(function(w){ return
        w.charAt(0).toUpperCase() + w.slice(1); }).join(' '); ]]]
