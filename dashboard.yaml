      - covers_count_sensor: ''
      - fans_count_sensor: ''
      - doors_count_sensor: ''
      - windows_count_sensor: ''
      - speakers_count_sensor: ''
      - lights_icon: ''
      - custom_1_icon: ''
      - custom_2_icon: ''
      - custom_3_icon: ''
      - custom_4_icon: ''
      - custom_1_color: ''
      - custom_2_color: ''
      - custom_3_color: ''
      - custom_4_color: ''
      - room_background: '#f5f5f5'
      - animation_delay: 0s
    card:
      type: custom:stack-in-card
      mode: horizontal
      cards:
        - type: vertical-stack
          cards:
            - type: custom:mushroom-template-card
              primary: '[[name]]'
              secondary: >
                {% set temp = states('[[entity_id_temperature]]') %} {% set hum
                = states('[[entity_id_humidity]]') %} {% set unit =
                state_attr('weather.home', 'temperature_unit') or '°C' %} {% set
                parts = [] %} {% if temp | is_number %}
                  {% set parts = parts + [temp | round(1) ~ unit] %}
                {% endif %} {% if hum | is_number %}
                  {% set parts = parts + [hum | round(1) ~ '%'] %}
                {% endif %} {{ parts | join(' / ') }}
              tap_action:
                action: navigate
                navigation_path: '[[navigation_path]]'
              uix:
                style: |
                  ha-card {
                    --primary-text-color: black;
                    border: 0;
                    padding: 5px 0 0 5px;
                    width: 500px;
                  }
            - type: custom:mushroom-template-card
              entity: '[[entity_id_lights]]'
              layout: horizontal
              icon: '[[icon]]'
              icon_color: >-
                {{ 'rgba(252, 242, 212, 1)' if is_state('[[entity_id_lights]]',
                'on') else 'rgba(91, 91, 91, 1)' }}
              tap_action:
                action: navigate
                navigation_path: '[[navigation_path]]'
              uix:
                style:
                  ha-tile-icon$: |
                    .container {
                      width: 120px !important;
                      height: 120px !important;
                      border-radius: 50%;
