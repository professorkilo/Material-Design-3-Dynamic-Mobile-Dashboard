kiosk_mode:
  mobile_settings:
    hide_header: true
streamline_templates:
  room_temperature_humidity_card:
    variables:
      temperature_entity: ''
      humidity_entity: ''
    card:
      type: custom:paper-buttons-row
      styles:
        justify-content: flex-start
        flex-wrap: wrap
        font-size: 0.9em
        line-height: 1.2em
        margin: 0 0 0 6px
        width: 100%
      extra_styles: |
        @keyframes fadeIn {
          from { opacity: 1; }
          to { opacity: 1; }
        }
        @keyframes slideInLeft {
          from {
            opacity: 1;
            transform: translateX(-8px);
          }
          to {
            opacity: 1;
            transform: translateX(0);
          }
        }
      buttons:
        - layout: name
          name: Room is
          styles:
            button:
              flex-basis: 1
              flex-shrink: 0
              animation: fadeIn 0.8s ease-out 0.3s both
            name:
              color: var(--primary-text-color)
          tap_action:
            action: none
        - layout: name
          entity: '[[temperature_entity]]'
          name: >-
            {% set entity = '[[temperature_entity]]' %} {% if '.' not in entity
            %} {% elif states(entity) in ['unavailable', 'unknown'] %}
            unavailable {% else %}
              {% set temp = states(entity) | float(0) %}
              {% if temp < 18 %} cold 
              {% elif temp < 22 %} cool 
              {% elif temp < 26 %} comfortable 
              {% else %} warm {% endif %}
            ({{ temp }}°C) {% endif %}
          tap_action:
            action: more-info
          styles:
            icon:
              color: var(--md-sys-color-primary)
            name:
              color: var(--md-sys-color-primary)
              font-weight: bold
            button:
              padding: 2px 8px
              background-color: >-
                color-mix(in srgb, var(--md-sys-color-on-primary) 50%,
                transparent)
              border-radius: 24px
              flex-basis: 1
              flex-shrink: 0
              animation: slideInLeft 0.6s ease-out 0.5s both
              transition: all 0.3s ease
              display: '{% if ''.'' not in ''[[temperature_entity]]'' %}none{% endif %}'
        - layout: name
          name: and
          styles:
            button:
              flex-basis: 1
              flex-shrink: 0
              animation: fadeIn 0.8s ease-out 0.7s both
              display: >-
                {% if '.' not in '[[temperature_entity]]' or '.' not in
                '[[humidity_entity]]' %}none{% endif %}
            name:
              color: var(--primary-text-color)
          tap_action:
            action: none
        - layout: name
          entity: '[[humidity_entity]]'
          name: >-
            {% set entity = '[[humidity_entity]]' %} {% if '.' not in entity %}
            {% elif states(entity) in ['unavailable', 'unknown'] %}unavailable
            {% else %}
              {% set hum = states(entity) | float(0) %}
              {% if hum < 31 %}dry{% elif hum < 51 %}good{% else %}humid{% endif %} ({{ hum }}%)
            {% endif %}
          tap_action:
            action: more-info
          styles:
            icon:
              color: var(--md-sys-color-primary)
            name:
              color: var(--md-sys-color-primary)
              font-weight: bold
            button:
              padding: 2px 8px
              background-color: >-
                color-mix(in srgb, var(--md-sys-color-on-primary) 50%,
                transparent)
              border-radius: 24px
              flex-basis: 1
              flex-shrink: 0
              animation: slideInLeft 0.6s ease-out 0.9s both
              transition: all 0.3s ease
              display: '{% if ''.'' not in ''[[humidity_entity]]'' %}none{% endif %}'
      uix:
        style: |
          ha-card {
            overflow: visible !important;
          }
  title_card:
    variables:
      title: ''
    card:
      type: custom:mushroom-title-card
      title: '[[title]]'
      uix:
        style: |
          ha-card {
            --title-font-size: 20px !important;
          }
  title_subtitle_card:
    variables:
      title: ''
